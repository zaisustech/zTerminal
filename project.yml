name: zTerminal
options:
  bundleIdPrefix: com.zterminal
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

packages:
  SwiftTerm:
    # Vendored fork (see ThirdParty/SwiftTerm/MODIFICATIONS.md).
    path: ThirdParty/SwiftTerm

settings:
  base:
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 9W849QCMHG
    CODE_SIGNING_REQUIRED: "YES"
    ENABLE_HARDENED_RUNTIME: "NO"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
  configs:
    # Release turns on Hardened Runtime; notarize.sh supplies the Developer ID.
    Release:
      ENABLE_HARDENED_RUNTIME: "YES"

targets:
  zTerminal:
    type: application
    platform: macOS
    sources:
      - path: Sources/zTerminal
      - path: Sources/Assets.xcassets
      - path: Resources/Fonts
      # Markdown preview renderer bundle (built by scripts/build-preview-assets.sh,
      # committed). Folder reference so fonts/ subpaths survive into the app.
      - path: Resources/Preview
        type: folder
        buildPhase: resources
    dependencies:
      - package: SwiftTerm
        product: SwiftTerm
      - target: zTerminalFinder
        embed: true
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/zTerminal.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: com.zterminal.app
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools

  zTerminalFinder:
    type: app-extension
    platform: macOS
    sources:
      - path: FinderExt
    settings:
      base:
        INFOPLIST_FILE: FinderExt/Info.plist
        CODE_SIGN_ENTITLEMENTS: FinderExt/zTerminalFinder.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.zterminal.app.finder
